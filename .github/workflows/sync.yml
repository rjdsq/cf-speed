name: 同步仓库所有内容

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天执行
  workflow_dispatch: # 手动触发

jobs:
  sync_full_from_upstream:
    name: Sync full content from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整历史，方便强制重置

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/ZhiXuanWang/cf-speed-dns.git
          git fetch upstream

      - name: Force reset to upstream main
        run: |
          git checkout main
          git reset --hard upstream/main # 强制覆盖本地为上游状态

      - name: Push to origin
        run: |
          git push origin main --force # 强制推送到你的 Fork
